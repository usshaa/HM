<div class="dashboard-container">
  <h2><mat-icon>dashboard</mat-icon> Dashboard</h2>

  <div class="kpi-grid">
    <mat-card class="kpi-card occ">
      <mat-icon>hotel</mat-icon>
      <div class="kpi-info">
        <span class="kpi-value">{{occupancyRate}}%</span>
        <span class="kpi-label">Occupancy Rate</span>
      </div>
    </mat-card>
    <mat-card class="kpi-card revenue">
      <mat-icon>attach_money</mat-icon>
      <div class="kpi-info">
        <span class="kpi-value">AED {{revenueToday | number:'1.0-0'}}</span>
        <span class="kpi-label">Avg Daily Rate</span>
      </div>
    </mat-card>
    <mat-card class="kpi-card rooms">
      <mat-icon>meeting_room</mat-icon>
      <div class="kpi-info">
        <span class="kpi-value">{{availableRooms}}</span>
        <span class="kpi-label">Available Rooms</span>
      </div>
    </mat-card>
    <mat-card class="kpi-card checkouts">
      <mat-icon>logout</mat-icon>
      <div class="kpi-info">
        <span class="kpi-value">{{pendingCheckouts}}</span>
        <span class="kpi-label">Checkouts</span>
      </div>
    </mat-card>
  </div>

  <div class="charts-grid">
    <mat-card class="chart-card">
      <mat-card-header><mat-card-title>Monthly Revenue</mat-card-title></mat-card-header>
      <mat-card-content>
        <canvas baseChart [data]="barChartData" [options]="barChartOptions" type="bar"></canvas>
      </mat-card-content>
    </mat-card>

    <mat-card class="chart-card">
      <mat-card-header><mat-card-title>Booking Sources</mat-card-title></mat-card-header>
      <mat-card-content>
        <canvas baseChart [data]="pieChartData" [options]="pieChartOptions" type="pie"></canvas>
      </mat-card-content>
    </mat-card>

    <mat-card class="chart-card wide">
      <mat-card-header><mat-card-title>Occupancy Trend (6 Months)</mat-card-title></mat-card-header>
      <mat-card-content>
        <canvas baseChart [data]="lineChartData" [options]="lineChartOptions" type="line"></canvas>
      </mat-card-content>
    </mat-card>
  </div>
</div>
