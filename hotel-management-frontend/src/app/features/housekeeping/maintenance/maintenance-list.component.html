<div class="maintenance-container">
  <div class="page-header">
    <h2><mat-icon>build</mat-icon> Maintenance Requests</h2>
    <button mat-raised-button color="primary" (click)="showForm = !showForm"><mat-icon>add</mat-icon> New Request</button>
  </div>

  <mat-card *ngIf="showForm" class="form-card">
    <mat-card-content>
      <div class="form-row">
        <mat-form-field><mat-label>Room ID</mat-label><input matInput type="number" [(ngModel)]="newRequest.roomId"></mat-form-field>
        <mat-form-field><mat-label>Reported By (User ID)</mat-label><input matInput type="number" [(ngModel)]="newRequest.reportedById"></mat-form-field>
        <mat-form-field><mat-label>Priority</mat-label>
          <mat-select [(ngModel)]="newRequest.priority">
            <mat-option *ngFor="let p of ['LOW','MEDIUM','HIGH','URGENT']" [value]="p">{{p}}</mat-option>
          </mat-select>
        </mat-form-field>
      </div>
      <mat-form-field class="full-width"><mat-label>Issue Description</mat-label><textarea matInput [(ngModel)]="newRequest.issueDescription"></textarea></mat-form-field>
      <button mat-raised-button color="primary" (click)="createRequest()">Submit Request</button>
    </mat-card-content>
  </mat-card>

  <table mat-table [dataSource]="requests" class="mat-elevation-z2 full-width">
    <ng-container matColumnDef="id"><th mat-header-cell *matHeaderCellDef>ID</th><td mat-cell *matCellDef="let r">{{r.id}}</td></ng-container>
    <ng-container matColumnDef="roomNumber"><th mat-header-cell *matHeaderCellDef>Room</th><td mat-cell *matCellDef="let r">{{r.roomNumber || r.roomId}}</td></ng-container>
    <ng-container matColumnDef="issueDescription"><th mat-header-cell *matHeaderCellDef>Issue</th><td mat-cell *matCellDef="let r">{{r.issueDescription}}</td></ng-container>
    <ng-container matColumnDef="priority"><th mat-header-cell *matHeaderCellDef>Priority</th><td mat-cell *matCellDef="let r"><span class="badge" [style.background]="getPriorityColor(r.priority)">{{r.priority}}</span></td></ng-container>
    <ng-container matColumnDef="status"><th mat-header-cell *matHeaderCellDef>Status</th><td mat-cell *matCellDef="let r"><span class="status-badge">{{r.status}}</span></td></ng-container>
    <ng-container matColumnDef="reportedByName"><th mat-header-cell *matHeaderCellDef>Reported By</th><td mat-cell *matCellDef="let r">{{r.reportedByName}}</td></ng-container>
    <ng-container matColumnDef="createdAt"><th mat-header-cell *matHeaderCellDef>Date</th><td mat-cell *matCellDef="let r">{{formatDate(r.createdAt)}}</td></ng-container>
    <ng-container matColumnDef="actions"><th mat-header-cell *matHeaderCellDef>Actions</th><td mat-cell *matCellDef="let r">
      <button mat-icon-button color="primary" *ngIf="r.status === 'OPEN'" (click)="updateStatus(r.id, 'IN_PROGRESS')" matTooltip="Start"><mat-icon>play_arrow</mat-icon></button>
      <button mat-icon-button color="accent" *ngIf="r.status === 'IN_PROGRESS'" (click)="updateStatus(r.id, 'RESOLVED')" matTooltip="Resolve"><mat-icon>check</mat-icon></button>
    </td></ng-container>
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
</div>
