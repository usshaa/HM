<div class="audit-container">
  <h2><mat-icon>history</mat-icon> Audit Logs</h2>
  <table mat-table [dataSource]="logs" class="mat-elevation-z2 full-width">
    <ng-container matColumnDef="id"><th mat-header-cell *matHeaderCellDef>ID</th><td mat-cell *matCellDef="let l">{{l.id}}</td></ng-container>
    <ng-container matColumnDef="userName"><th mat-header-cell *matHeaderCellDef>User</th><td mat-cell *matCellDef="let l">{{l.userName}}</td></ng-container>
    <ng-container matColumnDef="action"><th mat-header-cell *matHeaderCellDef>Action</th><td mat-cell *matCellDef="let l">{{l.action}}</td></ng-container>
    <ng-container matColumnDef="entityType"><th mat-header-cell *matHeaderCellDef>Entity</th><td mat-cell *matCellDef="let l">{{l.entityType}}</td></ng-container>
    <ng-container matColumnDef="entityId"><th mat-header-cell *matHeaderCellDef>Entity ID</th><td mat-cell *matCellDef="let l">{{l.entityId || '-'}}</td></ng-container>
    <ng-container matColumnDef="timestamp"><th mat-header-cell *matHeaderCellDef>Timestamp</th><td mat-cell *matCellDef="let l">{{formatDate(l.timestamp)}}</td></ng-container>
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
</div>
