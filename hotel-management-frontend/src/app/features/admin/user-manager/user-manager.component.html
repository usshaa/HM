<div class="admin-container">
  <div class="page-header">
    <h2><mat-icon>people</mat-icon> User Management</h2>
    <button mat-raised-button color="primary" (click)="showForm = !showForm"><mat-icon>person_add</mat-icon> Create Staff</button>
  </div>

  <mat-card *ngIf="showForm" class="form-card">
    <mat-card-header><mat-card-title>Create Staff Account</mat-card-title></mat-card-header>
    <mat-card-content>
      <div class="form-row">
        <mat-form-field><mat-label>Name</mat-label><input matInput [(ngModel)]="newStaff.name"></mat-form-field>
        <mat-form-field><mat-label>Email</mat-label><input matInput type="email" [(ngModel)]="newStaff.email"></mat-form-field>
        <mat-form-field><mat-label>Phone</mat-label><input matInput [(ngModel)]="newStaff.phone"></mat-form-field>
        <mat-form-field><mat-label>Role</mat-label>
          <mat-select [(ngModel)]="newStaff.role">
            <mat-option *ngFor="let r of roles" [value]="r">{{r}}</mat-option>
          </mat-select>
        </mat-form-field>
      </div>
      <button mat-raised-button color="primary" (click)="createStaff()">Create Account</button>
      <p class="hint">Default password: Staff&#64;123 (must be changed on first login)</p>
    </mat-card-content>
  </mat-card>

  <table mat-table [dataSource]="users" class="mat-elevation-z2 full-width">
    <ng-container matColumnDef="id"><th mat-header-cell *matHeaderCellDef>ID</th><td mat-cell *matCellDef="let u">{{u.id}}</td></ng-container>
    <ng-container matColumnDef="name"><th mat-header-cell *matHeaderCellDef>Name</th><td mat-cell *matCellDef="let u">{{u.name}}</td></ng-container>
    <ng-container matColumnDef="email"><th mat-header-cell *matHeaderCellDef>Email</th><td mat-cell *matCellDef="let u">{{u.email}}</td></ng-container>
    <ng-container matColumnDef="role"><th mat-header-cell *matHeaderCellDef>Role</th><td mat-cell *matCellDef="let u"><span class="role-badge" [attr.data-role]="u.role">{{u.role}}</span></td></ng-container>
    <ng-container matColumnDef="phone"><th mat-header-cell *matHeaderCellDef>Phone</th><td mat-cell *matCellDef="let u">{{u.phone || '-'}}</td></ng-container>
    <ng-container matColumnDef="isActive"><th mat-header-cell *matHeaderCellDef>Active</th><td mat-cell *matCellDef="let u">
      <mat-slide-toggle [checked]="u.isActive || u.active" (change)="toggleActive(u)" color="primary"></mat-slide-toggle>
    </td></ng-container>
    <ng-container matColumnDef="actions"><th mat-header-cell *matHeaderCellDef>Actions</th><td mat-cell *matCellDef="let u">
      <button mat-icon-button color="primary"><mat-icon>edit</mat-icon></button>
    </td></ng-container>
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
</div>
