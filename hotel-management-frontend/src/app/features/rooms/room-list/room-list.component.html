<div class="rooms-container">
  <h2>Rooms Management</h2>

  <mat-card class="rooms-card">
    <mat-card-content>
      <table mat-table [dataSource]="rooms" class="rooms-table">
        <!-- Room Number Column -->
        <ng-container matColumnDef="roomNumber">
          <th mat-header-cell *matHeaderCellDef>Room Number</th>
          <td mat-cell *matCellDef="let element">{{ element.roomNumber }}</td>
        </ng-container>

        <!-- Floor Column -->
        <ng-container matColumnDef="floor">
          <th mat-header-cell *matHeaderCellDef>Floor</th>
          <td mat-cell *matCellDef="let element">{{ element.floor }}</td>
        </ng-container>

        <!-- Room Type Column -->
        <ng-container matColumnDef="roomType">
          <th mat-header-cell *matHeaderCellDef>Room Type</th>
          <td mat-cell *matCellDef="let element">{{ element.roomType.typeName }}</td>
        </ng-container>

        <!-- Status Column -->
        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef>Status</th>
          <td mat-cell *matCellDef="let element">
            <span class="status-badge" [style.background-color]="getStatusColor(element.status)">
              {{ element.status }}
            </span>
          </td>
        </ng-container>

        <!-- Actions Column -->
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Actions</th>
          <td mat-cell *matCellDef="let element">
            <button mat-stroked-button color="primary" class="action-btn">Edit</button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>

      <div *ngIf="rooms.length === 0 && !loading" class="no-data">
        No rooms found
      </div>

      <div *ngIf="loading" class="loading">
        Loading...
      </div>
    </mat-card-content>
  </mat-card>
</div>
