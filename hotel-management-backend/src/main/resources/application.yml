spring:
  application:
    name: hotel-management-system
  datasource:
    url: jdbc:mysql://localhost:3306/hotel_management?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    database-platform: org.hibernate.dialect.MySQL8Dialect
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
    show-sql: false
  flyway:
    locations: classpath:db/migration
    enabled: true
  web:
    cors:
      allowed-origins: "http://localhost:4200, http://localhost:3000"
      allowed-methods: "GET,POST,PUT,DELETE,PATCH,OPTIONS"
      allowed-headers: "*"
      allow-credentials: true
      max-age: 3600

server:
  port: 8080
  servlet:
    context-path: /api

jwt:
  secret: your_super_secret_jwt_key_change_this_in_production_environment_very_important
  expiration: 900000  # 15 minutes in milliseconds
  refreshExpiration: 604800000  # 7 days in milliseconds

gemini:
  api:
    key: ${GEMINI_API_KEY:AIzaSyCi3_x_rL-GGLI79gNhzRSZ8mpbyJA-Xmc}

logging:
  level:
    root: INFO
    com.hotelmanagement: DEBUG
    org.springframework.security: DEBUG
